server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: hr-agent-system
  
  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/workspace_management?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  
  # Redis配置
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
  
  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

# MyBatis Plus配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

# JWT配置
jwt:
  secret: your-secret-key-here-change-it-in-production
  expiration: 86400000  # 24小时
  token-prefix: Bearer
  token-header: Authorization

# 日志配置
logging:
  level:
    com.company.hr: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 文件上传配置
file:
  upload:
    path: ./uploads
    max-size: 10485760  # 10MB
    allowed-types: pdf,doc,docx,jpg,png

# NLP API配置（可选，用于智能搜索）
nlp:
  enabled: false
  api:
    url: https://nlp-api.example.com/analyze  # NLP服务API地址
    key: your-api-key  # API密钥
  local:
    enabled: true  # 启用本地NLP处理（无需外部API）
